# Smoke-test `brew install fuzzy-quit` in isolation (does not use your host PATH).
# Mounts this repo read-only so we reuse scripts/homebrew-smoke-inner.sh (same as CI).
#
#   bash scripts/test-homebrew-docker.sh
#   docker compose -f docker-compose.brew.yml run --rm homebrew-smoke
#
# Optional image build (no mount): see docker/Dockerfile.homebrew-smoke
services:
  homebrew-smoke:
    image: ghcr.io/homebrew/brew:latest
    pull_policy: missing
    init: true
    working_dir: /src
    volumes:
      - .:/src:ro
    environment:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_ANALYTICS: "1"
      HOMEBREW_NO_ENV_HINTS: "1"
    command: ["/bin/bash", "scripts/homebrew-smoke-inner.sh"]
