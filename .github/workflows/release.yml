name: Release

# Creating a release: bump VERSION and CHANGELOG.md, commit, then:
#   git tag -a vX.Y.Z -m "Release vX.Y.Z" && git push origin vX.Y.Z
# This workflow checks VERSION matches the tag and opens a GitHub Release (source archives are automatic).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify VERSION matches tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="$(tr -d '[:space:]' < VERSION)"
          tag_ver="${TAG#v}"
          if [[ "$ver" != "$tag_ver" ]]; then
            echo "VERSION file is '$ver' but tag is '$TAG' (expected v$ver)." >&2
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
