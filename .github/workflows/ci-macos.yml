name: CI macOS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: brew install shellcheck

      - name: shellcheck
        run: |
          set -euo pipefail
          shellcheck -x quit lib/log.sh lib/quit.sh scripts/test-linux-docker.sh scripts/test-homebrew-docker.sh scripts/homebrew-smoke-inner.sh tests/run.sh
          for f in tests/test-*.sh; do
            shellcheck -x "$f"
          done

      - name: Run test suite
        run: bash tests/run.sh
